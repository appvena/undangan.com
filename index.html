<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Undangan — Pembuat Undangan Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Poppins', system-ui, sans-serif; background: #111225; color: #f0eeff; min-height: 100vh; }
  @keyframes fall { to { transform: translateY(720px) rotate(360deg); } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #33354f; border-radius: 99px; }
  input:focus, textarea:focus { border-color: #2f6f6a !important; }
  button { font-family: inherit; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid #22243c; background:#15162a; position:sticky; top:0; z-index:20; }
  .brand { display:flex; align-items:center; gap:10px; }
  .logo { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,#2f6f6a,#c9a24b); display:grid; place-items:center; color:#fff; }
  .tabs { display:flex; gap:4px; background:#20223a; padding:4px; border-radius:10px; }
  .tabs button { display:flex; align-items:center; gap:5px; padding:7px 12px; border-radius:7px; border:none; cursor:pointer; font-size:12.5px; font-weight:600; background:transparent; color:#8b88a8; }
  .tabs button.active { background:#2f6f6a; color:#fff; }

  .editor { padding:20px 22px 60px; }
  .field { display:block; margin-bottom:14px; }
  .field > span { display:block; font-size:12px; font-weight:600; color:#c9c4dd; margin-bottom:6px; }
  .field input, .field textarea { width:100%; padding:10px 12px; border-radius:10px; font-size:14px; border:1px solid #33354f; background:#20223a; color:#f0eeff; outline:none; font-family:inherit; }
  .field textarea { min-height:80px; resize:vertical; }

  .sec-title { display:flex; align-items:center; gap:8px; margin:14px 0 14px; }
  .sec-title .n { font-size:11px; font-weight:700; color:#c9a24b; width:20px; height:20px; border-radius:6px; background:#2a2410; display:grid; place-items:center; }
  .sec-title .t { font-size:13px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#c9c4dd; }

  .themes { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .theme-card { padding:12px; border-radius:14px; cursor:pointer; text-align:left; border:2px solid #2b2d45; background:#20223a; }
  .theme-card.active { border-color:#c9a24b; background:#26283f; }
  .theme-card .sw { display:flex; gap:4px; margin-bottom:8px; }
  .theme-card .sw span { width:16px; height:16px; border-radius:5px; border:1px solid rgba(255,255,255,.1); }
  .theme-card .nm { display:flex; align-items:center; gap:6px; font-size:13.5px; font-weight:600; color:#f0eeff; }
  .theme-card .tg { font-size:11px; color:#8b88a8; margin-top:2px; }

  .toggle { display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:12px 14px; border-radius:12px; cursor:pointer; margin-bottom:8px; border:1px solid #2b2d45; background:#20223a; }
  .toggle.on { border-color:#2f6f6a; background:#1c3330; }
  .toggle .ic { width:34px; height:34px; border-radius:9px; display:grid; place-items:center; flex-shrink:0; background:#2b2d45; color:#8b88a8; }
  .toggle.on .ic { background:#2f6f6a; color:#eafffb; }
  .toggle .lbl { flex:1; }
  .toggle .lbl b { display:block; font-size:13.5px; font-weight:600; color:#f0eeff; }
  .toggle .lbl small { display:block; font-size:11.5px; color:#8b88a8; }
  .toggle .sw { width:40px; height:23px; border-radius:99px; flex-shrink:0; position:relative; background:#3a3c58; }
  .toggle.on .sw { background:#2f6f6a; }
  .toggle .sw i { position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:99px; background:#fff; transition:left .2s; }
  .toggle.on .sw i { left:19px; }

  .galbox { margin-top:10px; padding:12px; border-radius:12px; background:#20223a; border:1px solid #2b2d45; }
  .galbox .row { display:flex; gap:8px; }
  .galbox input { flex:1; padding:10px 12px; border-radius:10px; font-size:14px; border:1px solid #33354f; background:#191b2e; color:#f0eeff; outline:none; }
  .galbox .add { padding:0 14px; border-radius:10px; border:none; background:#2f6f6a; color:#fff; cursor:pointer; }
  .galtags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .galtags span { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:#c9c4dd; background:#2b2d45; padding:4px 8px; border-radius:8px; }
  .galtags span i { cursor:pointer; display:inline-flex; }

  .stage { display:grid; place-items:center; padding:26px 12px 50px; background:radial-gradient(circle at 50% 0%, #1c1e38, #111225); }
  .phone { width:340px; max-width:100%; height:680px; border-radius:40px; background:#0b0c15; padding:10px; box-shadow:0 30px 60px -20px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06); position:relative; }
  .phone .notch { position:absolute; top:20px; left:50%; transform:translateX(-50%); width:110px; height:26px; background:#0b0c15; border-radius:99px; z-index:5; }
  .phone .screen { width:100%; height:100%; border-radius:30px; overflow:hidden; position:relative; }
  .phone .scroll { height:100%; overflow-y:auto; }

  /* Invitation (uses CSS vars set inline) */
  .inv { font-family:var(--body); color:var(--text); background:linear-gradient(160deg,var(--bg),var(--bg2)); min-height:100%; position:relative; padding:0 0 40px; }
  .inv .s { padding:22px 24px; text-align:center; position:relative; z-index:1; }
  .inv .lab { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .inv h1 { font-family:var(--display); font-size:40px; line-height:1.1; margin:6px 0 4px; color:var(--text); }
  .inv .hosts { font-size:15px; color:var(--muted); margin-top:6px; }
  .inv .datebig { font-family:var(--display); font-size:18px; color:var(--accent); }
  .inv .datesm { font-size:13px; color:var(--muted); margin-top:2px; }
  .inv .msg { font-size:15px; line-height:1.7; color:var(--text); max-width:360px; margin:0 auto; }
  .inv .cd { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .inv .cd .cell { min-width:58px; padding:10px 6px; border-radius:var(--radius); background:var(--card); border:1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
  .inv .cd .num { font-family:var(--display); font-size:26px; font-weight:600; color:var(--accent); line-height:1; }
  .inv .cd .u { font-size:10px; letter-spacing:1px; color:var(--muted); margin-top:4px; text-transform:uppercase; }
  .inv .venue { font-family:var(--display); font-size:20px; color:var(--text); }
  .inv .addr { font-size:13px; color:var(--muted); margin:4px auto 0; max-width:320px; }
  .inv .mapbtn { display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:9px 18px; border-radius:var(--radius); text-decoration:none; border:1px solid var(--accent); color:var(--accent); font-size:13px; font-weight:600; }
  .inv .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:360px; margin:0 auto; }
  .inv .grid div { aspect-ratio:1; border-radius:var(--radius); overflow:hidden; background:var(--bg2); }
  .inv .grid img { width:100%; height:100%; object-fit:cover; }
  .inv .rsvp { max-width:320px; margin:0 auto; background:var(--card); padding:16px; border-radius:var(--radius); border:1px solid color-mix(in srgb, var(--accent) 22%, transparent); display:grid; gap:10px; }
  .inv .rsvp input { width:100%; padding:10px 12px; border-radius:var(--radius); font-size:14px; border:1px solid color-mix(in srgb, var(--muted) 45%, transparent); background:var(--card); color:var(--text); outline:none; font-family:inherit; }
  .inv .rsvp .att { display:flex; gap:8px; }
  .inv .rsvp .att button { flex:1; padding:9px; border-radius:var(--radius); font-size:13px; cursor:pointer; border:1px solid color-mix(in srgb, var(--accent) 40%, transparent); background:transparent; color:var(--text); }
  .inv .rsvp .att button.sel { background:var(--accent); color:var(--card); }
  .inv .rsvp .send { padding:11px; border-radius:var(--radius); border:none; cursor:pointer; background:var(--accent); color:var(--card); font-weight:600; font-size:14px; }
  .inv .thanks { text-align:center; padding:18px 12px; background:var(--card); border-radius:var(--radius); border:1px solid color-mix(in srgb, var(--accent) 25%, transparent); max-width:320px; margin:0 auto; }
  .confetti { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .confetti span { position:absolute; top:-20px; border-radius:2px; opacity:.85; }

  @media (min-width:900px) {
    #app { display:flex; height:calc(100vh - 61px); }
    .editor { width:400px; flex-shrink:0; overflow-y:auto; border-right:1px solid #22243c; }
    .stage { flex:1; overflow-y:auto; }
    .tabs { display:none; }
  }
  @media (max-width:899px) {
    #app { display:block; }
    body.view-edit .stage { display:none; }
    body.view-preview .editor { display:none; }
  }
</style>
</head>
<body class="view-edit">
<div class="topbar">
  <div class="brand">
    <span class="logo" id="ic-logo"></span>
    <div>
      <div style="font-size:15px;font-weight:700;line-height:1;">Studio Undangan</div>
      <div style="font-size:11px;color:#8b88a8;">Pembuat undangan digital</div>
    </div>
  </div>
  <div class="tabs">
    <button data-tab="edit" class="active" id="tab-edit"></button>
    <button data-tab="preview" id="tab-prev"></button>
  </div>
</div>

<div id="app">
  <div class="editor" id="editor"></div>
  <div class="stage">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen"><div class="scroll" id="preview"></div></div>
    </div>
  </div>
</div>

<script>
/* ---------- Icons ---------- */
var ICONS = {
  mapPin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
  image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  sparkles:'<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0Z"/>',
  palette:'<path d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8Z"/><circle cx="13.5" cy="6.5" r=".8" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".8" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".8" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".8" fill="currentColor"/>',
  pencil:'<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497Z"/><path d="m15 5 4 4"/>',
  eye:'<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
  plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
  trash:'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
  gem:'<path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/>',
  leaf:'<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
  party:'<path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-3.9 3.9"/><path d="M15 6.5a4.5 4.5 0 0 0-4.5-4.5"/>'
};
function icon(name, size, color) {
  size = size || 18;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+(color||'currentColor')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||'')+'</svg>';
}

/* ---------- Themes ---------- */
var THEMES = {
  kirana:{ name:"Kirana", tag:"Elegan · botani", icon:"leaf", swatch:["#f7f4ee","#7a8b6f","#b08d57"],
    vars:{bg:"#f6f2ea",bg2:"#efe9dc",text:"#3a4a3f",muted:"#8a917f",accent:"#7a8b6f",accent2:"#b08d57",card:"#fffdf8",radius:"4px",display:"'Cormorant Garamond', Georgia, serif",body:"'Marcellus', Georgia, serif"} },
  pesta:{ name:"Pesta", tag:"Ceria · warna-warni", icon:"party", swatch:["#ff5b7f","#ffd23f","#4ac6d2"],
    vars:{bg:"#fff8f2",bg2:"#ffeef4",text:"#3d2b4f",muted:"#9b8aa8",accent:"#ff5b7f",accent2:"#4ac6d2",card:"#ffffff",radius:"22px",display:"'Poppins', system-ui, sans-serif",body:"'Poppins', system-ui, sans-serif"} },
  nokta:{ name:"Nokta", tag:"Modern · dramatis", icon:"gem", swatch:["#0e0f1a","#d4af37","#6c5ce7"],
    vars:{bg:"#0e0f1a",bg2:"#15172a",text:"#efeaff",muted:"#8b88a8",accent:"#d4af37",accent2:"#8f7bff",card:"#171932",radius:"6px",display:"'Playfair Display', Georgia, serif",body:"'Poppins', system-ui, sans-serif"} },
  wastra:{ name:"Wastra", tag:"Tradisional · batik", icon:"sparkles", swatch:["#f3e7d3","#8b2e2e","#b8860b"],
    vars:{bg:"#f3e7d1",bg2:"#ecdcbe",text:"#4a2c1a",muted:"#9c7b56",accent:"#8b2e2e",accent2:"#b8860b",card:"#fbf5e8",radius:"3px",display:"'Playfair Display', Georgia, serif",body:"'Cormorant Garamond', Georgia, serif"} }
};

/* ---------- State ---------- */
var future = new Date(); future.setDate(future.getDate()+45); future.setHours(10,0,0,0);
var state = {
  kind:"Pernikahan", title:"Andi & Sinta", hosts:"Putra dari Bpk. Budi & Ibu Ani",
  date: future.toISOString().slice(0,16),
  venue:"Gedung Serbaguna Melati", address:"Jl. Merdeka No. 10, Jakarta Pusat",
  message:"Dengan penuh syukur, kami mengundang Bapak/Ibu/Saudara/i untuk hadir dan memberikan doa restu pada hari bahagia kami.",
  photos:[], theme:"kirana",
  features:{ countdown:true, rsvp:true, map:true, gallery:false }
};

/* ---------- Helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function slug(s){ return (s||"acara").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40); }
function fmtDate(iso){ if(!iso) return ""; var d=new Date(iso); if(isNaN(d)) return ""; return d.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
function fmtTime(iso){ if(!iso) return ""; var d=new Date(iso); if(isNaN(d)) return ""; return d.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})+" WIB"; }

/* ---------- Divider per theme ---------- */
function divider(t){
  if(t==="kirana") return '<svg width="120" height="20" viewBox="0 0 120 20" style="margin:6px auto;display:block"><line x1="0" y1="10" x2="45" y2="10" stroke="var(--accent2)" stroke-width="1"/><line x1="75" y1="10" x2="120" y2="10" stroke="var(--accent2)" stroke-width="1"/><path d="M60 3 C 66 8, 66 12, 60 17 C 54 12, 54 8, 60 3 Z" fill="var(--accent)"/></svg>';
  if(t==="wastra") return '<div style="height:14px;margin:8px auto;width:160px;background:repeating-linear-gradient(90deg,var(--accent) 0 6px,transparent 6px 12px);opacity:.7"></div>';
  if(t==="nokta") return '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0"><div style="height:1px;width:50px;background:var(--accent)"></div>'+icon("gem",12,"var(--accent)")+'<div style="height:1px;width:50px;background:var(--accent)"></div></div>';
  return '<div style="display:flex;justify-content:center;gap:6px;margin:8px 0"><span style="width:8px;height:8px;border-radius:99px;background:#ff5b7f"></span><span style="width:8px;height:8px;border-radius:99px;background:#ffd23f"></span><span style="width:8px;height:8px;border-radius:99px;background:#4ac6d2"></span></div>';
}
function confetti(){
  var colors=["#ff5b7f","#ffd23f","#4ac6d2","#7b61ff","#5fd68a"], out='<div class="confetti">';
  for(var i=0;i<26;i++){
    var left=Math.random()*100, delay=Math.random()*5, dur=4+Math.random()*4, sz=6+Math.random()*6, rot=Math.random()*360, col=colors[i%5];
    out+='<span style="left:'+left+'%;width:'+sz+'px;height:'+(sz*1.6)+'px;background:'+col+';transform:rotate('+rot+'deg);animation:fall '+dur+'s linear '+delay+'s infinite"></span>';
  }
  return out+'</div>';
}

/* ---------- Build preview ---------- */
function buildPreview(){
  var t=THEMES[state.theme], v=t.vars, f=state.features;
  var styleVars="--bg:"+v.bg+";--bg2:"+v.bg2+";--text:"+v.text+";--muted:"+v.muted+";--accent:"+v.accent+";--accent2:"+v.accent2+";--card:"+v.card+";--radius:"+v.radius+";--display:"+v.display+";--body:"+v.body+";";
  var mapUrl="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(state.address||state.venue||"");
  var html='<div class="inv" style="'+styleVars+'">';
  if(state.theme==="pesta") html+=confetti();

  // hero
  html+='<div class="s" style="padding-top:44px;padding-bottom:30px'+(state.theme==="nokta"?';border-bottom:1px solid color-mix(in srgb, var(--accent) 35%, transparent)':'')+'">';
  html+='<div class="lab" style="color:var(--accent2)">Undangan '+esc(state.kind||"Acara")+'</div>';
  html+='<h1 style="font-weight:'+(state.theme==="pesta"?"700":"500")+'">'+esc(state.title||"Judul Acara")+'</h1>';
  if(state.hosts) html+='<p class="hosts">'+esc(state.hosts)+'</p>';
  html+=divider(state.theme);
  if(state.date){ html+='<div style="margin-top:6px"><p class="datebig">'+esc(fmtDate(state.date))+'</p><p class="datesm">'+esc(fmtTime(state.date))+'</p></div>'; }
  html+='</div>';

  // message
  if(state.message){ html+='<div class="s" style="padding-top:6px"><p class="msg" style="font-style:'+(state.theme==="kirana"?"italic":"normal")+'">'+esc(state.message)+'</p></div>'; }

  // countdown
  if(f.countdown && state.date){
    html+='<div class="s"><div class="lab">Menuju Hari Bahagia</div><div class="cd">'
      +'<div class="cell"><div class="num" id="cd-d">00</div><div class="u">Hari</div></div>'
      +'<div class="cell"><div class="num" id="cd-h">00</div><div class="u">Jam</div></div>'
      +'<div class="cell"><div class="num" id="cd-m">00</div><div class="u">Menit</div></div>'
      +'<div class="cell"><div class="num" id="cd-s">00</div><div class="u">Detik</div></div>'
      +'</div></div>';
  }

  // map
  if(f.map && (state.venue||state.address)){
    html+='<div class="s"><div class="lab">Lokasi</div>'+icon("mapPin",22,"var(--accent)");
    if(state.venue) html+='<p class="venue">'+esc(state.venue)+'</p>';
    if(state.address) html+='<p class="addr">'+esc(state.address)+'</p>';
    html+='<a class="mapbtn" target="_blank" rel="noreferrer" href="'+esc(mapUrl)+'">'+icon("mapPin",14)+' Buka Peta</a></div>';
  }

  // gallery
  if(f.gallery){
    html+='<div class="s"><div class="lab">Galeri</div>';
    if(state.photos.length){
      html+='<div class="grid">';
      for(var i=0;i<state.photos.length;i++){ html+='<div><img src="'+esc(state.photos[i])+'" alt="" onerror="this.style.opacity=.2"></div>'; }
      html+='</div>';
    } else { html+='<p class="addr">Belum ada foto ditambahkan.</p>'; }
    html+='</div>';
  }

  // rsvp
  if(f.rsvp){
    html+='<div class="s"><div class="lab">Konfirmasi Kehadiran</div>'
      +'<p class="addr" style="margin-bottom:14px">Mohon konfirmasi kehadiranmu ya.</p>'
      +'<div id="rsvp-box"></div></div>';
  }

  // footer
  html+='<div class="s" style="padding-top:30px">'+icon("heart",16,"var(--accent)")
    +'<p style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:8px">Merupakan suatu kehormatan atas kehadiran Anda</p></div>';

  html+='</div>';
  return html;
}

/* ---------- RSVP ---------- */
function rsvpKey(){ return "rsvp:"+slug(state.title); }
function getRsvp(){ try{ var r=localStorage.getItem(rsvpKey()); return r?JSON.parse(r):[]; }catch(e){ return []; } }
var rsvpDraft={ name:"", count:1, attend:"hadir", done:false };

function renderRsvp(){
  var box=document.getElementById("rsvp-box"); if(!box) return;
  if(rsvpDraft.done){
    var list=getRsvp(), coming=0;
    for(var i=0;i<list.length;i++){ if(list[i].attend==="hadir") coming+=list[i].count; }
    box.innerHTML='<div class="thanks">'+icon("check",26,"var(--accent)")
      +'<p style="font-family:var(--display);font-size:19px;margin:8px 0 2px;color:var(--text)">Terima kasih!</p>'
      +'<p style="font-size:13px;color:var(--muted)">Konfirmasimu sudah tercatat.</p>'
      +'<p style="font-size:12px;color:var(--accent);margin-top:8px">'+coming+' tamu akan hadir</p></div>';
    return;
  }
  box.innerHTML='<div class="rsvp">'
    +'<input id="rv-name" placeholder="Nama kamu" value="'+esc(rsvpDraft.name)+'">'
    +'<div class="att"><button data-att="hadir" class="'+(rsvpDraft.attend==="hadir"?"sel":"")+'">Hadir</button>'
    +'<button data-att="tidak" class="'+(rsvpDraft.attend==="tidak"?"sel":"")+'">Tidak</button></div>'
    +(rsvpDraft.attend==="hadir"?'<input id="rv-count" type="number" min="1" max="20" value="'+esc(rsvpDraft.count)+'" placeholder="Jumlah tamu">':'')
    +'<button class="send" id="rv-send">Kirim Konfirmasi</button></div>';
  var nm=document.getElementById("rv-name");
  if(nm) nm.oninput=function(){ rsvpDraft.name=this.value; };
  var ct=document.getElementById("rv-count");
  if(ct) ct.oninput=function(){ rsvpDraft.count=this.value; };
  var atts=box.querySelectorAll(".att button");
  for(var i=0;i<atts.length;i++){ atts[i].onclick=function(){ rsvpDraft.attend=this.getAttribute("data-att"); renderRsvp(); }; }
  document.getElementById("rv-send").onclick=function(){
    if(!rsvpDraft.name.trim()) return;
    var list=getRsvp();
    list.unshift({ name:rsvpDraft.name.trim(), count:Number(rsvpDraft.count)||1, attend:rsvpDraft.attend, at:Date.now() });
    try{ localStorage.setItem(rsvpKey(), JSON.stringify(list)); }catch(e){}
    rsvpDraft.done=true; renderRsvp();
  };
}

/* ---------- Countdown tick ---------- */
function tick(){
  if(!(state.features.countdown && state.date)) return;
  var el=document.getElementById("cd-d"); if(!el) return;
  var diff=Math.max(0, new Date(state.date).getTime()-Date.now());
  var d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  function p(n){ return String(n).padStart(2,"0"); }
  el.textContent=p(d);
  document.getElementById("cd-h").textContent=p(h);
  document.getElementById("cd-m").textContent=p(m);
  document.getElementById("cd-s").textContent=p(s);
}

/* ---------- Render preview + rebind ---------- */
function renderPreview(){
  document.getElementById("preview").innerHTML=buildPreview();
  renderRsvp();
  tick();
}

/* ---------- Build editor ---------- */
function buildEditor(){
  var e=document.getElementById("editor");
  var themeCards="";
  for(var key in THEMES){
    var t=THEMES[key], active=(key===state.theme);
    themeCards+='<button class="theme-card'+(active?" active":"")+'" data-theme="'+key+'">'
      +'<div class="sw"><span style="background:'+t.swatch[0]+'"></span><span style="background:'+t.swatch[1]+'"></span><span style="background:'+t.swatch[2]+'"></span></div>'
      +'<div class="nm">'+icon(t.icon,14,active?"#c9a24b":"#8b88a8")+'<span>'+t.name+'</span></div>'
      +'<div class="tg">'+t.tag+'</div></button>';
  }
  function tg(k,ic,lbl,desc){
    var on=state.features[k];
    return '<button class="toggle'+(on?" on":"")+'" data-feat="'+k+'"><span class="ic">'+icon(ic,17)+'</span>'
      +'<span class="lbl"><b>'+lbl+'</b><small>'+desc+'</small></span><span class="sw"><i></i></span></button>';
  }
  e.innerHTML=
    '<div class="sec-title"><span class="n">1</span>'+icon("pencil",15,"#8b88a8")+'<span class="t">Detail Acara</span></div>'
    +'<label class="field"><span>Jenis acara</span><input data-k="kind" value="'+esc(state.kind)+'"></label>'
    +'<label class="field"><span>Judul / nama</span><input data-k="title" value="'+esc(state.title)+'"></label>'
    +'<label class="field"><span>Keterangan tuan rumah</span><input data-k="hosts" value="'+esc(state.hosts)+'"></label>'
    +'<label class="field"><span>Tanggal & waktu</span><input data-k="date" type="datetime-local" value="'+esc(state.date)+'"></label>'
    +'<label class="field"><span>Nama tempat</span><input data-k="venue" value="'+esc(state.venue)+'"></label>'
    +'<label class="field"><span>Alamat lengkap (untuk peta)</span><input data-k="address" value="'+esc(state.address)+'"></label>'
    +'<label class="field"><span>Pesan / kata sambutan</span><textarea data-k="message">'+esc(state.message)+'</textarea></label>'
    +'<div class="sec-title"><span class="n">2</span>'+icon("palette",15,"#8b88a8")+'<span class="t">Pilih Desain</span></div>'
    +'<div class="themes">'+themeCards+'</div>'
    +'<div class="sec-title"><span class="n">3</span>'+icon("sparkles",15,"#8b88a8")+'<span class="t">Fitur</span></div>'
    +tg("countdown","clock","Hitung mundur","Timer menuju hari-H")
    +tg("rsvp","users","RSVP","Tamu konfirmasi kehadiran")
    +tg("map","mapPin","Peta lokasi","Tombol buka Google Maps")
    +tg("gallery","image","Galeri foto","Kumpulan foto acara")
    +'<div id="gal-wrap"></div>';

  // bind text inputs
  var inputs=e.querySelectorAll("[data-k]");
  for(var i=0;i<inputs.length;i++){
    inputs[i].addEventListener("input", function(){
      state[this.getAttribute("data-k")]=this.value;
      rsvpDraft.done=false;
      renderPreview();
    });
  }
  // theme cards
  var cards=e.querySelectorAll("[data-theme]");
  for(var j=0;j<cards.length;j++){
    cards[j].addEventListener("click", function(){ state.theme=this.getAttribute("data-theme"); buildEditor(); renderPreview(); });
  }
  // toggles
  var togs=e.querySelectorAll("[data-feat]");
  for(var k=0;k<togs.length;k++){
    togs[k].addEventListener("click", function(){ var key=this.getAttribute("data-feat"); state.features[key]=!state.features[key]; buildEditor(); renderPreview(); });
  }
  renderGalleryBox();
}

function renderGalleryBox(){
  var wrap=document.getElementById("gal-wrap"); if(!wrap) return;
  if(!state.features.gallery){ wrap.innerHTML=""; return; }
  var tags="";
  for(var i=0;i<state.photos.length;i++){
    tags+='<span>Foto '+(i+1)+'<i data-del="'+i+'">'+icon("trash",12)+'</i></span>';
  }
  wrap.innerHTML='<div class="galbox"><div class="row"><input id="gal-input" placeholder="Tempel URL gambar..."><button class="add" id="gal-add">'+icon("plus",16)+'</button></div>'
    +(state.photos.length?'<div class="galtags">'+tags+'</div>':'')+'</div>';
  var inp=document.getElementById("gal-input");
  function add(){ if(!inp.value.trim()) return; state.photos.push(inp.value.trim()); inp.value=""; renderGalleryBox(); renderPreview(); }
  document.getElementById("gal-add").onclick=add;
  inp.addEventListener("keydown", function(ev){ if(ev.key==="Enter") add(); });
  var dels=wrap.querySelectorAll("[data-del]");
  for(var d=0;d<dels.length;d++){
    dels[d].onclick=function(){ var idx=Number(this.getAttribute("data-del")); state.photos.splice(idx,1); renderGalleryBox(); renderPreview(); };
  }
}

/* ---------- Tabs (mobile) ---------- */
function initTabs(){
  document.getElementById("ic-logo").innerHTML=icon("sparkles",17,"#fff");
  document.getElementById("tab-edit").innerHTML=icon("pencil",14)+" Edit";
  document.getElementById("tab-prev").innerHTML=icon("eye",14)+" Pratinjau";
  var btns=document.querySelectorAll(".tabs button");
  for(var i=0;i<btns.length;i++){
    btns[i].addEventListener("click", function(){
      var tab=this.getAttribute("data-tab");
      document.body.className = tab==="edit" ? "view-edit" : "view-preview";
      for(var j=0;j<btns.length;j++){ btns[j].classList.remove("active"); }
      this.classList.add("active");
    });
  }
}

/* ---------- Init ---------- */
initTabs();
buildEditor();
renderPreview();
setInterval(tick, 1000);
</script>
</body>
</html>
