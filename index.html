<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Undangan — Pembuat Undangan Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #111225; }
  #root { min-height: 100vh; }
  @keyframes fall { to { transform: translateY(720px) rotate(360deg); } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #33354f; border-radius: 99px; }
  input:focus, textarea:focus { border-color: #2f6f6a !important; }
  @media (max-width: 899px) { .desk { display: none !important; } }
  @media (min-width: 900px) { .mob { display: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---------- Icons (inline SVG, no dependency) ---------- */
const ICONS = {
  mapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
  clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
  image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
  users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  sparkles: '<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0Z"/>',
  palette: '<path d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8Z"/><circle cx="13.5" cy="6.5" r=".8" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".8" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".8" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".8" fill="currentColor"/>',
  pencil: '<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497Z"/><path d="m15 5 4 4"/>',
  eye: '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
  plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
  trash: '<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
  party: '<path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-3.9 3.9"/><path d="M15 6.5a4.5 4.5 0 0 0-4.5-4.5"/>',
  gem: '<path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/>',
  leaf: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
};
function Icon({ name, size = 18, style }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}
    dangerouslySetInnerHTML={{ __html: ICONS[name] || "" }} />;
}

/* ---------- Themes ---------- */
const THEMES = {
  kirana: { name: "Kirana", tag: "Elegan · botani", icon: "leaf", swatch: ["#f7f4ee", "#7a8b6f", "#b08d57"],
    vars: { "--bg": "#f6f2ea", "--bg2": "#efe9dc", "--text": "#3a4a3f", "--muted": "#8a917f", "--accent": "#7a8b6f", "--accent2": "#b08d57", "--card": "#fffdf8", "--radius": "4px", "--display": "'Cormorant Garamond', Georgia, serif", "--body": "'Marcellus', Georgia, serif" } },
  pesta: { name: "Pesta", tag: "Ceria · warna-warni", icon: "party", swatch: ["#ff5b7f", "#ffd23f", "#4ac6d2"],
    vars: { "--bg": "#fff8f2", "--bg2": "#ffeef4", "--text": "#3d2b4f", "--muted": "#9b8aa8", "--accent": "#ff5b7f", "--accent2": "#4ac6d2", "--card": "#ffffff", "--radius": "22px", "--display": "'Poppins', system-ui, sans-serif", "--body": "'Poppins', system-ui, sans-serif" } },
  nokta: { name: "Nokta", tag: "Modern · dramatis", icon: "gem", swatch: ["#0e0f1a", "#d4af37", "#6c5ce7"],
    vars: { "--bg": "#0e0f1a", "--bg2": "#15172a", "--text": "#efeaff", "--muted": "#8b88a8", "--accent": "#d4af37", "--accent2": "#8f7bff", "--card": "#171932", "--radius": "6px", "--display": "'Playfair Display', Georgia, serif", "--body": "'Poppins', system-ui, sans-serif" } },
  wastra: { name: "Wastra", tag: "Tradisional · batik", icon: "sparkles", swatch: ["#f3e7d3", "#8b2e2e", "#b8860b"],
    vars: { "--bg": "#f3e7d1", "--bg2": "#ecdcbe", "--text": "#4a2c1a", "--muted": "#9c7b56", "--accent": "#8b2e2e", "--accent2": "#b8860b", "--card": "#fbf5e8", "--radius": "3px", "--display": "'Playfair Display', Georgia, serif", "--body": "'Cormorant Garamond', Georgia, serif" } },
};

/* ---------- Helpers ---------- */
const slugify = (s) => (s || "acara").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 40);
const fmtDate = (iso) => { if (!iso) return ""; const d = new Date(iso); if (isNaN(d)) return ""; return d.toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" }); };
const fmtTime = (iso) => { if (!iso) return ""; const d = new Date(iso); if (isNaN(d)) return ""; return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" }) + " WIB"; };

/* ---------- Countdown ---------- */
function Countdown({ target }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  const diff = Math.max(0, new Date(target).getTime() - now);
  const cells = [
    { v: Math.floor(diff / 86400000), l: "Hari" },
    { v: Math.floor((diff % 86400000) / 3600000), l: "Jam" },
    { v: Math.floor((diff % 3600000) / 60000), l: "Menit" },
    { v: Math.floor((diff % 60000) / 1000), l: "Detik" },
  ];
  return (
    <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
      {cells.map((c) => (
        <div key={c.l} style={{ minWidth: 58, padding: "10px 6px", borderRadius: "var(--radius)", background: "var(--card)", border: "1px solid color-mix(in srgb, var(--accent) 30%, transparent)" }}>
          <div style={{ fontFamily: "var(--display)", fontSize: 26, fontWeight: 600, color: "var(--accent)", lineHeight: 1 }}>{String(c.v).padStart(2, "0")}</div>
          <div style={{ fontSize: 10, letterSpacing: 1, color: "var(--muted)", marginTop: 4, textTransform: "uppercase" }}>{c.l}</div>
        </div>
      ))}
    </div>
  );
}

/* ---------- RSVP (localStorage) ---------- */
function Rsvp({ storageKey }) {
  const [list, setList] = useState([]);
  const [name, setName] = useState("");
  const [count, setCount] = useState(1);
  const [attend, setAttend] = useState("hadir");
  const [done, setDone] = useState(false);

  useEffect(() => {
    try { const raw = localStorage.getItem(storageKey); setList(raw ? JSON.parse(raw) : []); }
    catch { setList([]); }
  }, [storageKey]);

  const submit = () => {
    if (!name.trim()) return;
    const next = [{ name: name.trim(), count: Number(count) || 1, attend, at: Date.now() }, ...list];
    setList(next); setDone(true);
    try { localStorage.setItem(storageKey, JSON.stringify(next)); } catch {}
  };
  const coming = list.filter((x) => x.attend === "hadir").reduce((a, b) => a + b.count, 0);

  if (done) return (
    <div style={{ textAlign: "center", padding: "18px 12px", background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid color-mix(in srgb, var(--accent) 25%, transparent)" }}>
      <Icon name="check" size={26} style={{ color: "var(--accent)" }} />
      <p style={{ fontFamily: "var(--display)", fontSize: 19, margin: "8px 0 2px", color: "var(--text)" }}>Terima kasih!</p>
      <p style={{ fontSize: 13, color: "var(--muted)" }}>Konfirmasimu sudah tercatat.</p>
      <p style={{ fontSize: 12, color: "var(--accent)", marginTop: 8 }}>{coming} tamu akan hadir</p>
    </div>
  );

  const field = { width: "100%", padding: "10px 12px", borderRadius: "var(--radius)", fontSize: 14, border: "1px solid color-mix(in srgb, var(--muted) 45%, transparent)", background: "var(--card)", color: "var(--text)", outline: "none", fontFamily: "inherit" };
  return (
    <div style={{ background: "var(--card)", padding: 16, borderRadius: "var(--radius)", border: "1px solid color-mix(in srgb, var(--accent) 22%, transparent)" }}>
      <div style={{ display: "grid", gap: 10 }}>
        <input style={field} placeholder="Nama kamu" value={name} onChange={(e) => setName(e.target.value)} />
        <div style={{ display: "flex", gap: 8 }}>
          {[["hadir", "Hadir"], ["tidak", "Tidak"]].map(([v, lbl]) => (
            <button key={v} onClick={() => setAttend(v)} style={{ flex: 1, padding: "9px", borderRadius: "var(--radius)", fontSize: 13, cursor: "pointer", fontFamily: "inherit", border: "1px solid color-mix(in srgb, var(--accent) 40%, transparent)", background: attend === v ? "var(--accent)" : "transparent", color: attend === v ? "var(--card)" : "var(--text)" }}>{lbl}</button>
          ))}
        </div>
        {attend === "hadir" && <input style={field} type="number" min={1} max={20} value={count} onChange={(e) => setCount(e.target.value)} placeholder="Jumlah tamu" />}
        <button onClick={submit} style={{ padding: "11px", borderRadius: "var(--radius)", border: "none", cursor: "pointer", background: "var(--accent)", color: "var(--card)", fontWeight: 600, fontSize: 14, fontFamily: "inherit" }}>Kirim Konfirmasi</button>
      </div>
    </div>
  );
}

/* ---------- Confetti ---------- */
function Confetti() {
  const colors = ["#ff5b7f", "#ffd23f", "#4ac6d2", "#7b61ff", "#5fd68a"];
  const pieces = useMemo(() => Array.from({ length: 26 }, (_, i) => ({
    left: Math.random() * 100, delay: Math.random() * 5, dur: 4 + Math.random() * 4,
    color: colors[i % colors.length], size: 6 + Math.random() * 6, rot: Math.random() * 360,
  })), []);
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) return null;
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
      {pieces.map((p, i) => (
        <span key={i} style={{ position: "absolute", top: -20, left: p.left + "%", width: p.size, height: p.size * 1.6, background: p.color, borderRadius: 2, opacity: 0.85, transform: "rotate(" + p.rot + "deg)", animation: "fall " + p.dur + "s linear " + p.delay + "s infinite" }} />
      ))}
    </div>
  );
}

/* ---------- Divider ---------- */
function Divider({ theme }) {
  if (theme === "kirana") return (
    <svg width="120" height="20" viewBox="0 0 120 20" style={{ margin: "6px auto", display: "block" }}>
      <line x1="0" y1="10" x2="45" y2="10" stroke="var(--accent2)" strokeWidth="1" />
      <line x1="75" y1="10" x2="120" y2="10" stroke="var(--accent2)" strokeWidth="1" />
      <path d="M60 3 C 66 8, 66 12, 60 17 C 54 12, 54 8, 60 3 Z" fill="var(--accent)" />
    </svg>
  );
  if (theme === "wastra") return <div style={{ height: 14, margin: "8px auto", width: 160, background: "repeating-linear-gradient(90deg, var(--accent) 0 6px, transparent 6px 12px)", opacity: 0.7 }} />;
  if (theme === "nokta") return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, margin: "8px 0" }}>
      <div style={{ height: 1, width: 50, background: "var(--accent)" }} />
      <Icon name="gem" size={12} style={{ color: "var(--accent)" }} />
      <div style={{ height: 1, width: 50, background: "var(--accent)" }} />
    </div>
  );
  return (
    <div style={{ display: "flex", justifyContent: "center", gap: 6, margin: "8px 0" }}>
      {["#ff5b7f", "#ffd23f", "#4ac6d2"].map((c) => <span key={c} style={{ width: 8, height: 8, borderRadius: 99, background: c }} />)}
    </div>
  );
}

/* ---------- Invitation ---------- */
function Invitation({ data, features, themeKey }) {
  const theme = THEMES[themeKey];
  const rsvpKey = "rsvp:" + slugify(data.title);
  const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(data.address || data.venue || "");
  const wrapStyle = { ...theme.vars, fontFamily: "var(--body)", color: "var(--text)", background: "linear-gradient(160deg, var(--bg), var(--bg2))", minHeight: "100%", position: "relative", padding: "0 0 40px" };
  const section = { padding: "22px 24px", textAlign: "center", position: "relative", zIndex: 1 };
  const label = { fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "var(--muted)", marginBottom: 10 };

  return (
    <div style={wrapStyle}>
      {themeKey === "pesta" && <Confetti />}
      <div style={{ ...section, paddingTop: 44, paddingBottom: 30, borderBottom: themeKey === "nokta" ? "1px solid color-mix(in srgb, var(--accent) 35%, transparent)" : "none" }}>
        <div style={{ ...label, color: "var(--accent2)" }}>Undangan {data.kind || "Acara"}</div>
        <h1 style={{ fontFamily: "var(--display)", fontWeight: themeKey === "pesta" ? 700 : 500, fontSize: 40, lineHeight: 1.1, margin: "6px 0 4px", color: "var(--text)", letterSpacing: themeKey === "nokta" ? 0.5 : 0 }}>{data.title || "Judul Acara"}</h1>
        {data.hosts && <p style={{ fontSize: 15, color: "var(--muted)", marginTop: 6 }}>{data.hosts}</p>}
        <Divider theme={themeKey} />
        {data.date && (
          <div style={{ marginTop: 6 }}>
            <p style={{ fontFamily: "var(--display)", fontSize: 18, color: "var(--accent)" }}>{fmtDate(data.date)}</p>
            <p style={{ fontSize: 13, color: "var(--muted)", marginTop: 2 }}>{fmtTime(data.date)}</p>
          </div>
        )}
      </div>
      {data.message && (
        <div style={{ ...section, paddingTop: 6 }}>
          <p style={{ fontSize: 15, lineHeight: 1.7, color: "var(--text)", fontStyle: themeKey === "kirana" ? "italic" : "normal", maxWidth: 360, margin: "0 auto" }}>{data.message}</p>
        </div>
      )}
      {features.countdown && data.date && (
        <div style={section}><div style={label}>Menuju Hari Bahagia</div><Countdown target={data.date} /></div>
      )}
      {features.map && (data.venue || data.address) && (
        <div style={section}>
          <div style={label}>Lokasi</div>
          <Icon name="mapPin" size={22} style={{ color: "var(--accent)", margin: "0 auto 6px" }} />
          {data.venue && <p style={{ fontFamily: "var(--display)", fontSize: 20, color: "var(--text)" }}>{data.venue}</p>}
          {data.address && <p style={{ fontSize: 13, color: "var(--muted)", margin: "4px auto 0", maxWidth: 320 }}>{data.address}</p>}
          <a href={mapUrl} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, marginTop: 12, padding: "9px 18px", borderRadius: "var(--radius)", textDecoration: "none", border: "1px solid var(--accent)", color: "var(--accent)", fontSize: 13, fontWeight: 600 }}>
            <Icon name="mapPin" size={14} /> Buka Peta
          </a>
        </div>
      )}
      {features.gallery && (
        <div style={section}>
          <div style={label}>Galeri</div>
          {data.photos && data.photos.length > 0 ? (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, maxWidth: 360, margin: "0 auto" }}>
              {data.photos.map((src, i) => (
                <div key={i} style={{ aspectRatio: "1", borderRadius: "var(--radius)", overflow: "hidden", background: "var(--bg2)" }}>
                  <img src={src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={(e) => { e.target.style.opacity = 0.2; }} />
                </div>
              ))}
            </div>
          ) : <p style={{ fontSize: 13, color: "var(--muted)" }}>Belum ada foto ditambahkan.</p>}
        </div>
      )}
      {features.rsvp && (
        <div style={section}>
          <div style={label}>Konfirmasi Kehadiran</div>
          <p style={{ fontSize: 13, color: "var(--muted)", maxWidth: 300, margin: "0 auto 14px" }}>Mohon konfirmasi kehadiranmu ya.</p>
          <div style={{ maxWidth: 320, margin: "0 auto" }}><Rsvp storageKey={rsvpKey} /></div>
        </div>
      )}
      <div style={{ ...section, paddingTop: 30 }}>
        <Icon name="heart" size={16} style={{ color: "var(--accent)", margin: "0 auto 8px" }} />
        <p style={{ fontSize: 12, color: "var(--muted)", letterSpacing: 1 }}>Merupakan suatu kehormatan atas kehadiran Anda</p>
      </div>
    </div>
  );
}

/* ---------- Editor bits ---------- */
const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, fontSize: 14, boxSizing: "border-box", border: "1px solid #33354f", background: "#20223a", color: "#f0eeff", outline: "none", fontFamily: "inherit" };
function Field({ label, children }) {
  return <label style={{ display: "block", marginBottom: 14 }}>
    <span style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#c9c4dd", marginBottom: 6 }}>{label}</span>{children}
  </label>;
}
function Toggle({ on, onClick, label, desc, icon }) {
  return (
    <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", textAlign: "left", padding: "12px 14px", borderRadius: 12, cursor: "pointer", marginBottom: 8, border: "1px solid " + (on ? "#2f6f6a" : "#2b2d45"), background: on ? "#1c3330" : "#20223a", fontFamily: "inherit" }}>
      <span style={{ width: 34, height: 34, borderRadius: 9, display: "grid", placeItems: "center", flexShrink: 0, background: on ? "#2f6f6a" : "#2b2d45", color: on ? "#eafffb" : "#8b88a8" }}><Icon name={icon} size={17} /></span>
      <span style={{ flex: 1 }}>
        <span style={{ display: "block", fontSize: 13.5, fontWeight: 600, color: "#f0eeff" }}>{label}</span>
        <span style={{ display: "block", fontSize: 11.5, color: "#8b88a8" }}>{desc}</span>
      </span>
      <span style={{ width: 40, height: 23, borderRadius: 99, flexShrink: 0, position: "relative", background: on ? "#2f6f6a" : "#3a3c58" }}>
        <span style={{ position: "absolute", top: 2, left: on ? 19 : 2, width: 19, height: 19, borderRadius: 99, background: "#fff", transition: "left .2s" }} />
      </span>
    </button>
  );
}
function SectionTitle({ children, icon, n }) {
  return <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "6px 0 14px" }}>
    <span style={{ fontSize: 11, fontWeight: 700, color: "#c9a24b", width: 20, height: 20, borderRadius: 6, background: "#2a2410", display: "grid", placeItems: "center" }}>{n}</span>
    <Icon name={icon} size={15} style={{ color: "#8b88a8" }} />
    <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: "#c9c4dd" }}>{children}</span>
  </div>;
}

/* ---------- App ---------- */
function App() {
  const [tab, setTab] = useState("edit");
  const [themeKey, setThemeKey] = useState("kirana");
  const [data, setData] = useState({
    kind: "Pernikahan", title: "Andi & Sinta", hosts: "Putra dari Bpk. Budi & Ibu Ani",
    date: (() => { const d = new Date(); d.setDate(d.getDate() + 45); d.setHours(10, 0, 0, 0); return d.toISOString().slice(0, 16); })(),
    venue: "Gedung Serbaguna Melati", address: "Jl. Merdeka No. 10, Jakarta Pusat",
    message: "Dengan penuh syukur, kami mengundang Bapak/Ibu/Saudara/i untuk hadir dan memberikan doa restu pada hari bahagia kami.",
    photos: [],
  });
  const [features, setFeatures] = useState({ countdown: true, rsvp: true, map: true, gallery: false });
  const [photoInput, setPhotoInput] = useState("");
  const set = (k, v) => setData((d) => ({ ...d, [k]: v }));
  const toggle = (k) => setFeatures((f) => ({ ...f, [k]: !f[k] }));
  const addPhoto = () => { if (!photoInput.trim()) return; set("photos", [...data.photos, photoInput.trim()]); setPhotoInput(""); };

  const phone = (
    <div style={{ width: 340, maxWidth: "100%", height: 680, borderRadius: 40, background: "#0b0c15", padding: 10, boxShadow: "0 30px 60px -20px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06)", position: "relative" }}>
      <div style={{ position: "absolute", top: 20, left: "50%", transform: "translateX(-50%)", width: 110, height: 26, background: "#0b0c15", borderRadius: 99, zIndex: 5 }} />
      <div style={{ width: "100%", height: "100%", borderRadius: 30, overflow: "hidden", position: "relative" }}>
        <div style={{ height: "100%", overflowY: "auto" }}><Invitation data={data} features={features} themeKey={themeKey} /></div>
      </div>
    </div>
  );

  const editor = (
    <div style={{ padding: "4px 2px" }}>
      <SectionTitle icon="pencil" n="1">Detail Acara</SectionTitle>
      <Field label="Jenis acara"><input style={inputStyle} value={data.kind} onChange={(e) => set("kind", e.target.value)} /></Field>
      <Field label="Judul / nama"><input style={inputStyle} value={data.title} onChange={(e) => set("title", e.target.value)} /></Field>
      <Field label="Keterangan tuan rumah"><input style={inputStyle} value={data.hosts} onChange={(e) => set("hosts", e.target.value)} /></Field>
      <Field label="Tanggal & waktu"><input style={inputStyle} type="datetime-local" value={data.date} onChange={(e) => set("date", e.target.value)} /></Field>
      <Field label="Nama tempat"><input style={inputStyle} value={data.venue} onChange={(e) => set("venue", e.target.value)} /></Field>
      <Field label="Alamat lengkap (untuk peta)"><input style={inputStyle} value={data.address} onChange={(e) => set("address", e.target.value)} /></Field>
      <Field label="Pesan / kata sambutan"><textarea style={{ ...inputStyle, minHeight: 80, resize: "vertical" }} value={data.message} onChange={(e) => set("message", e.target.value)} /></Field>

      <SectionTitle icon="palette" n="2">Pilih Desain</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 18 }}>
        {Object.entries(THEMES).map(([key, t]) => {
          const active = key === themeKey;
          return (
            <button key={key} onClick={() => setThemeKey(key)} style={{ padding: 12, borderRadius: 14, cursor: "pointer", textAlign: "left", fontFamily: "inherit", border: "2px solid " + (active ? "#c9a24b" : "#2b2d45"), background: active ? "#26283f" : "#20223a" }}>
              <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                {t.swatch.map((c) => <span key={c} style={{ width: 16, height: 16, borderRadius: 5, background: c, border: "1px solid rgba(255,255,255,.1)" }} />)}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name={t.icon} size={14} style={{ color: active ? "#c9a24b" : "#8b88a8" }} />
                <span style={{ fontSize: 13.5, fontWeight: 600, color: "#f0eeff" }}>{t.name}</span>
              </div>
              <div style={{ fontSize: 11, color: "#8b88a8", marginTop: 2 }}>{t.tag}</div>
            </button>
          );
        })}
      </div>

      <SectionTitle icon="sparkles" n="3">Fitur</SectionTitle>
      <Toggle on={features.countdown} onClick={() => toggle("countdown")} icon="clock" label="Hitung mundur" desc="Timer menuju hari-H" />
      <Toggle on={features.rsvp} onClick={() => toggle("rsvp")} icon="users" label="RSVP" desc="Tamu konfirmasi kehadiran" />
      <Toggle on={features.map} onClick={() => toggle("map")} icon="mapPin" label="Peta lokasi" desc="Tombol buka Google Maps" />
      <Toggle on={features.gallery} onClick={() => toggle("gallery")} icon="image" label="Galeri foto" desc="Kumpulan foto acara" />

      {features.gallery && (
        <div style={{ marginTop: 10, padding: 12, borderRadius: 12, background: "#20223a", border: "1px solid #2b2d45" }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input style={{ ...inputStyle, flex: 1 }} value={photoInput} onChange={(e) => setPhotoInput(e.target.value)} placeholder="Tempel URL gambar..." onKeyDown={(e) => e.key === "Enter" && addPhoto()} />
            <button onClick={addPhoto} style={{ padding: "0 14px", borderRadius: 10, border: "none", background: "#2f6f6a", color: "#fff", cursor: "pointer" }}><Icon name="plus" size={16} /></button>
          </div>
          {data.photos.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
              {data.photos.map((p, i) => (
                <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, color: "#c9c4dd", background: "#2b2d45", padding: "4px 8px", borderRadius: 8 }}>
                  Foto {i + 1}
                  <span style={{ cursor: "pointer", display: "inline-flex" }} onClick={() => set("photos", data.photos.filter((_, j) => j !== i))}><Icon name="trash" size={12} /></span>
                </span>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );

  return (
    <div style={{ fontFamily: "'Poppins', system-ui, sans-serif", background: "#111225", minHeight: "100vh", color: "#f0eeff" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 20px", borderBottom: "1px solid #22243c", background: "#15162a", position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ width: 32, height: 32, borderRadius: 9, background: "linear-gradient(135deg,#2f6f6a,#c9a24b)", display: "grid", placeItems: "center", color: "#fff" }}><Icon name="sparkles" size={17} /></span>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1 }}>Studio Undangan</div>
            <div style={{ fontSize: 11, color: "#8b88a8" }}>Pembuat undangan digital</div>
          </div>
        </div>
        <div className="mob" style={{ display: "flex", gap: 4, background: "#20223a", padding: 4, borderRadius: 10 }}>
          {[["edit", "Edit", "pencil"], ["preview", "Pratinjau", "eye"]].map(([v, lbl, ic]) => (
            <button key={v} onClick={() => setTab(v)} style={{ display: "flex", alignItems: "center", gap: 5, padding: "7px 12px", borderRadius: 7, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 12.5, fontWeight: 600, background: tab === v ? "#2f6f6a" : "transparent", color: tab === v ? "#fff" : "#8b88a8" }}><Icon name={ic} size={14} />{lbl}</button>
          ))}
        </div>
      </div>

      <div className="desk" style={{ display: "flex", height: "calc(100vh - 61px)" }}>
        <div style={{ width: 400, flexShrink: 0, overflowY: "auto", padding: "20px 22px", borderRight: "1px solid #22243c" }}>{editor}</div>
        <div style={{ flex: 1, overflowY: "auto", display: "grid", placeItems: "center", padding: 30, background: "radial-gradient(circle at 50% 0%, #1c1e38, #111225)" }}>{phone}</div>
      </div>

      <div className="mob">
        {tab === "edit"
          ? <div style={{ padding: "18px 18px 60px" }}>{editor}</div>
          : <div style={{ display: "grid", placeItems: "center", padding: "26px 12px 50px", background: "radial-gradient(circle at 50% 0%, #1c1e38, #111225)" }}>{phone}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
