<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daftar / Masuk — Studio Undangan</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    font-family: system-ui, -apple-system, sans-serif; background:#111225; color:#f0eeff; }
  .card { width:100%; max-width:400px; background:#191b2e; border:1px solid #2b2d45;
    border-radius:20px; padding:28px 24px; }
  .logo { width:44px; height:44px; border-radius:12px; margin:0 auto 14px;
    background:linear-gradient(135deg,#2f6f6a,#c9a24b); display:grid; place-items:center; }
  h1 { font-size:19px; margin:0 0 4px; text-align:center; }
  .sub { font-size:12.5px; color:#8b88a8; text-align:center; margin-bottom:22px; }
  label { display:block; font-size:12px; font-weight:600; color:#c9c4dd; margin:0 0 6px; }
  input { width:100%; padding:12px 14px; border-radius:11px; font-size:15px; margin-bottom:14px;
    border:1px solid #33354f; background:#20223a; color:#f0eeff; outline:none; }
  input:focus { border-color:#2f6f6a; }
  .btns { display:flex; gap:10px; margin-top:4px; }
  button { flex:1; padding:13px; border-radius:11px; border:none; cursor:pointer;
    font-size:14px; font-weight:600; font-family:inherit; }
  .primary { background:#2f6f6a; color:#fff; }
  .ghost { background:transparent; color:#c9c4dd; border:1px solid #33354f; }
  button:disabled { opacity:.5; }
  #msg { font-size:13px; margin-top:16px; padding:12px; border-radius:10px; text-align:center;
    display:none; white-space:pre-line; line-height:1.5; }
  #msg.err { display:block; background:#2a1416; border:1px solid #7a2f38; color:#ffb3ba; }
  #msg.ok  { display:block; background:#12271f; border:1px solid #2f6f4a; color:#8fe6b0; }
  .signed { text-align:center; }
  .signed .who { font-size:15px; margin:10px 0 4px; }
  .signed .em { color:#8fe6b0; font-weight:600; word-break:break-all; }
  .signed .uid { font-size:11px; color:#6f6d86; margin:6px 0 20px; word-break:break-all; }
  .hint { font-size:11px; color:#6f6d86; margin-top:16px; text-align:center; line-height:1.5; }
  .hide { display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0Z"/></svg>
  </div>

  <!-- Form daftar/masuk -->
  <div id="authForm">
    <h1>Studio Undangan</h1>
    <div class="sub">Daftar akun baru atau masuk</div>
    <label>Email</label>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="nama@email.com" />
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="Minimal 6 karakter" />
    <div class="btns">
      <button class="ghost" id="btn-signup">Daftar</button>
      <button class="primary" id="btn-login">Masuk</button>
    </div>
    <div id="msg"></div>
    <div class="hint">Ini halaman uji. Nanti digabung ke aplikasi utama.</div>
  </div>

  <!-- Setelah login -->
  <div id="signedIn" class="signed hide">
    <h1>Berhasil masuk 🎉</h1>
    <div class="who">Kamu masuk sebagai</div>
    <div class="em" id="who-email"></div>
    <div class="uid" id="who-uid"></div>
    <button class="ghost" id="btn-logout">Keluar</button>
    <div class="hint">Kalau kamu lihat ini, sistem akun sudah berfungsi penuh.</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyASJd4rJIijxKiVfZfHaNRDYRIYBnxXwuQ",
    authDomain: "undangan-app-d7bf8.firebaseapp.com",
    projectId: "undangan-app-d7bf8",
    storageBucket: "undangan-app-d7bf8.firebasestorage.app",
    messagingSenderId: "29842739425",
    appId: "1:29842739425:web:9f5baa06784e4a6aafe7a0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const $ = (id) => document.getElementById(id);
  const msg = $("msg");
  function showMsg(text, ok){ msg.className = ok ? "ok" : "err"; msg.textContent = text; }
  function clearMsg(){ msg.className = ""; msg.textContent = ""; }

  function friendly(code){
    switch(code){
      case "auth/email-already-in-use": return "Email sudah terdaftar. Coba tombol Masuk.";
      case "auth/invalid-email": return "Format email tidak valid.";
      case "auth/weak-password": return "Password minimal 6 karakter.";
      case "auth/missing-password": return "Password belum diisi.";
      case "auth/invalid-credential":
      case "auth/wrong-password":
      case "auth/user-not-found": return "Email atau password salah.";
      case "auth/too-many-requests": return "Terlalu banyak percobaan. Coba lagi nanti.";
      case "auth/network-request-failed": return "Gagal terhubung. Cek koneksi internet.";
      default: return "Terjadi kesalahan: " + code;
    }
  }

  function setBusy(b){
    $("btn-signup").disabled = b;
    $("btn-login").disabled = b;
  }

  $("btn-signup").onclick = async () => {
    clearMsg(); setBusy(true);
    try {
      await createUserWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
      // onAuthStateChanged akan menampilkan panel "berhasil masuk"
    } catch (e) { showMsg(friendly(e.code || e.message), false); }
    setBusy(false);
  };

  $("btn-login").onclick = async () => {
    clearMsg(); setBusy(true);
    try {
      await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
    } catch (e) { showMsg(friendly(e.code || e.message), false); }
    setBusy(false);
  };

  $("btn-logout").onclick = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      $("authForm").classList.add("hide");
      $("signedIn").classList.remove("hide");
      $("who-email").textContent = user.email;
      $("who-uid").textContent = "ID: " + user.uid;
    } else {
      $("signedIn").classList.add("hide");
      $("authForm").classList.remove("hide");
      $("password").value = "";
    }
  });
</script>
</body>
</html>
